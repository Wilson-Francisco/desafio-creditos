name: CI - API de Consulta de Créditos

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip'

    - name: Instalar as Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verificar Estilo e Formatação (Ruff)
      run: |
        ruff check backend/
        ruff format --check backend/

    - name: Verificar Tipagem Estática (Mypy)
      run: |
        mypy backend/

    - name: Executar Testes Unitários (Pytest)
      run: |
        pytest backend/
